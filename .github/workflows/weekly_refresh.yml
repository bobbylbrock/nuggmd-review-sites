name: Weekly Review Refresh

on:
  schedule:
    # Every Monday at 8 AM CDT (13:00 UTC)
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch reviews from Google Sheet
        env:
          SHEET_TOKEN_JSON:        ${{ secrets.SHEET_TOKEN_JSON }}
          SHEET_CREDENTIALS_JSON:  ${{ secrets.SHEET_CREDENTIALS_JSON }}
          REVIEWS_SHEET_ID:        ${{ secrets.REVIEWS_SHEET_ID }}
        run: python scripts/fetch_reviews.py

      - name: Commit updated reviews if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/reviews.json
          if git diff --cached --quiet; then
            echo "No changes to reviews.json — skipping commit"
          else
            git commit -m "chore: weekly review data refresh"
            git push
          fi
